name: Release

permissions:
  contents: write

on:
  push:
    tags:
      - 'v[0-9].[0-9].[0-9]*'
      - 'v[0-9].[0-9].[0-9][0-9]*'
      - 'v[0-9].[0-9][0-9].[0-9]*'
      - 'v[0-9].[0-9][0-9].[0-9][0-9]*'
      - 'v[0-9][0-9].[0-9].[0-9]*'
      - 'v[0-9][0-9].[0-9].[0-9][0-9]*'
      - 'v[0-9][0-9].[0-9][0-9].[0-9]*'
      - 'v[0-9][0-9].[0-9][0-9].[0-9][0-9]*'

env:
  CARGO_TERM_COLOR: always

jobs:
  build-and-release:
    name: Build & Release
    runs-on: windows-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable-x86_64-pc-windows-msvc

#       - name: Install UPX
#         uses: crazy-max/ghaction-upx@v3
#         with:
#           install-only: true

      - name: Build Release
        run: cargo build --release

      - name: Install WiX Toolset
        if: startsWith(github.ref, 'refs/tags/')
        run: choco install wixtoolset --no-progress -y

      - name: Add WiX to PATH
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        run: |
          $wixPath = "${env:ProgramFiles(x86)}\WiX Toolset v3.11\bin"
          echo $wixPath | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install NSIS
        if: startsWith(github.ref, 'refs/tags/')
        run: choco install nsis --no-progress -y

      - name: Get Version
        if: startsWith(github.ref, 'refs/tags/')
        id: get_version
        shell: pwsh
        run: |
          $version = $env:GITHUB_REF -replace "refs/tags/v", ""
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT
          Write-Host "Version: $version"

      - name: Prepare Assets
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        run: |
           $version = "${{ steps.get_version.outputs.VERSION }}"
           $raw_exe = "target/release/wsldashboard.exe"
           $versioned_exe = "target/release/wsldashboard.v$version.exe"
           # $upx_exe = "target/release/wsldashboard.v$version.upx.exe"

           # Rename original to versioned name (Uncompressed)
           Move-Item $raw_exe $versioned_exe

           # # Copy versioned to UPX target name
           # Copy-Item $versioned_exe $upx_exe

      - name: Ensure installer assets
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          New-Item -ItemType Directory -Force -Path "build/installer/common" | Out-Null
          Copy-Item "LICENSE" "build/installer/common/LICENSE" -Force
          Get-Item "build/installer/common/LICENSE"

      - name: Build MSI (WiX)
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        run: |
          $version = "${{ steps.get_version.outputs.VERSION }}"
          $versionParts = $version -split '\.'
          while ($versionParts.Count -lt 4) { $versionParts += '0' }
          $wixVersion = $versionParts -join '.'
          $output_msi = "target/release/wsldashboard.v$version.msi"
          $source_exe = "target/release/wsldashboard.v$version.exe"
          $license_rtf = "build/installer/common/LICENSE.rtf"
          candle "build/installer/wix/Product.wxs" -arch x64 -ext WixUIExtension -dVersion="$wixVersion" -dProductName="WSL Dashboard" -dManufacturer="WSL Dashboard" -dSourceExe="$source_exe" -dAppIcon="build/installer/common/app.ico" -dLicenseRtf="$license_rtf" -dLicenseFile="build/installer/common/LICENSE" -o "build/installer/wix/"
          light "build/installer/wix/Product.wixobj" -ext WixUIExtension -o "$output_msi"

      - name: Build NSIS
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $version = "${{ steps.get_version.outputs.VERSION }}"
          $output_dir = (Resolve-Path "target/release").Path
          $source_exe = (Resolve-Path "target/release/wsldashboard.v$version.exe").Path
          $build_dir = (Resolve-Path "build/installer").Path

          $licensePath = Join-Path $build_dir "common/LICENSE"
          Write-Host "NSIS LICENSE path: $licensePath"
          if (-not (Test-Path $licensePath)) {
            throw "LICENSE file not found at $licensePath"
          }

          & "${env:ProgramFiles(x86)}\NSIS\makensis.exe" `
            /DVERSION=$version `
            /DOUTPUT_DIR="$output_dir" `
            /DSOURCE_EXE="$source_exe" `
            /DBUILD_DIR="$build_dir" `
            "build/installer/nsis/installer.nsi"

#       - name: Compress with UPX
#         if: startsWith(github.ref, 'refs/tags/')
#         run: upx --best --lzma target/release/wsldashboard.v${{ steps.get_version.outputs.VERSION }}.upx.exe

      - name: Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            target/release/wsldashboard.v${{ steps.get_version.outputs.VERSION }}.exe
            target/release/wsldashboard.v${{ steps.get_version.outputs.VERSION }}.msi
            target/release/wsldashboard.v${{ steps.get_version.outputs.VERSION }}.nsis.exe
            # target/release/wsldashboard.v${{ steps.get_version.outputs.VERSION }}.upx.exe
          generate_release_notes: true
